output_dir: '/../output/' # the directory where the covariances, needlet coefficients, and maps will be saved
output_prefix: ''   # the prefix for all the files that will be saved
output_suffix: ''   # the prefix for all the files that will be saved
save_weights: 'no'                        # set to yes to save the weight maps
param_dict_file: './fg_SEDs_default_params.yml'  # the file where you save the params of the SEDs

work_in_CAR: 'yes'

ELLMAX: 8000                                       
wavelet_type: 'TopHatHarmonic'                    
BinSize: 100

N_freqs: 3
bandpass_type: 'ActualBandpasses'   # can be actual or delta bandpasses
freqs_delta_ghz: [90,150,220]

# the files where you have saved the bandpasses:
freq_bp_files: ['../data/passband_dr6_pa5_f090.txt',
'../data/passband_dr6_pa4_f150.txt',
'../data/passband_dr6_pa4_f220.txt']


# the files where you have saved the frequency maps
freq_map_files: ['../data/act_dr6.02_std_BR_night_pa5_f90_2way_set0_map.fits',
'../data/act_dr6.02_std_BR_night_pa4_f150_2way_set0_map.fits',
'../data/act_dr6.02_std_BR_night_pa4_f220_2way_set0_map.fits']



beam_type: 'Gaussians'
beam_FWHM_arcmin: [2.1, 1.3, 1.0] #update with whatever beam FWHM was used in the sim map construction; note that ordering should always be from lowest-res to highest-res maps (here and in the lists of maps, freqs, etc above)
# perform_ILC_at_beam: 10  # the FWHM of the common beam to convolve to before performing ILC (in arcmin)

N_side: 4096

ILC_preserved_comp: 'CMB'
N_deproj: 0
ILC_deproj_comps: []
N_SED_params: 0
SED_params: []
SED_params_vals: []
SED_params_priors: []
SED_params_priors_params: []

N_maps_xcorr: 0

save_as: 'fits'

ILC_bias_tol: 0.01